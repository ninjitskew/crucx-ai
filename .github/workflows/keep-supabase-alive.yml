name: Keep Supabase Alive

on:
  schedule:
    # Runs daily at 06:17 UTC — keeps free-tier project from pausing
    - cron: "17 6 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/rest/v1/book?select=slug&limit=1" \
            -H "apikey: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}")
          echo "Supabase responded with HTTP $STATUS"
          if [ "$STATUS" -ne 200 ]; then
            echo "::warning::Supabase ping returned $STATUS — project may be paused"
            exit 1
          fi
